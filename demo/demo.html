
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Jalali DatePicker Demo</title>

    <link rel="stylesheet" href="../dist/modern-jalali-datepicker.css">
    <link rel="stylesheet" href="./demo.css">

</head>

<body>

<h1>Modern Jalali DatePicker Demo</h1>


<!-- ===================== -->
<div class="demo">

<h2>Basic Date Picker</h2>

<input id="basic">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Range Picker</h2>

<input id="range">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Multiple Selection</h2>

<input id="multiple">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Time Picker</h2>

<input id="time">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Themes</h2>

<select id="theme">

<option value="light">Light</option>
<option value="dark">Dark</option>
<option value="auto">Auto</option>

</select>

<br><br>

<input id="themePicker">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Calendar Events</h2>

<input id="events">

</div>


<!-- ===================== -->
<div class="demo">

<h2>Min / Max</h2>

<input id="limit">

</div>


<!-- ===================== -->
<div class="demo" style="padding-bottom: 420px;">

    <h2>Methods</h2>

    <div class="actions">

        <button id="close">Close</button>
        <button id="clear">Clear</button>
        <button id="get">Get Date</button>
        <button id="set">Set Date</button>
        <button id="destroy">Destroy</button>

    </div>

    <pre id="output"></pre>
    <input id="methods">
</div>


<script type="module" src="./demo.js"></script>


</body>

</html>
